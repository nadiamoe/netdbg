name: Docker

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Git commit timestamps
        id: commit-meta
        run: |-
          TIMESTAMP=$(git log -1 --pretty=%ct)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "date3339=$(date --utc --rfc-3339=seconds -d "@$TIMESTAMP" | sed 's/ /T/')" >> $GITHUB_OUTPUT
          echo "revshort=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |-
            org.opencontainers.image.created=${{ steps.commit-meta.outputs.date3339 }}
          annotations: |-
            manifest:org.opencontainers.image.created=${{ steps.commit-meta.outputs.date3339 }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |-
            docker.io/${{ env.IMAGE_NAME}}:latest
            docker.io/${{ env.IMAGE_NAME}}:latest-${{ steps.commit-meta.outputs.revshort }}
            ghcr.io/${{ env.IMAGE_NAME}}:latest
            ghcr.io/${{ env.IMAGE_NAME}}:latest-${{ steps.commit-meta.outputs.revshort }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          SOURCE_DATE_EPOCH: ${{ steps.commit-meta.outputs.timestamp }}
